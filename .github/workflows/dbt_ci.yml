name: dbt CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          instacart_warehouse:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: dummy
                user: dummy
                password: dummy
                role: dummy
                warehouse: dummy
                database: dummy
                schema: dummy
                threads: 1
          EOF

      - name: Install dbt packages
        working-directory: ./dbt
        run: dbt deps

      - name: Validate dbt project
        working-directory: ./dbt
        run: dbt parse