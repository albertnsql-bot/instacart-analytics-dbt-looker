version: 2

models:
  - name: fact_order_items
    description: "Order-product level fact table with simulated revenue and margin"
    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: revenue
        tests:
          - not_null
      - name: product_id
        tests:
          - relationships:
             to: ref('dim_product')
             field: product_id